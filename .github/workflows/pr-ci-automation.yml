name: PR CI Automation

on:
  workflow_run:
    workflows:
      - Build
      - Branch Name Check
      - PR Title Check
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-ci-automation-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  comment-and-automerge:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Update CI comment and auto-merge eligible PRs
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const requiredWorkflows = ["Build", "Branch Name Check", "PR Title Check"];
            const prRefs = run.pull_requests || [];

            if (prRefs.length === 0) {
              core.info("No pull request is associated with this workflow run.");
              return;
            }

            async function upsertComment(issueNumber, marker, body) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  per_page: 100,
                }
              );

              const existingComment = comments.find(comment =>
                typeof comment.body === "string" && comment.body.includes(marker)
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body,
                });
              }
            }

            function formatStatusLine(status) {
              const state = status.conclusion || status.status || "missing";
              return `- ${status.name}: ${state}`;
            }

            for (const prRef of prRefs) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prRef.number,
              });

              if (pr.state !== "open") {
                core.info(`Skipping PR #${pr.number} because it is not open.`);
                continue;
              }

              const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event: "pull_request",
                head_sha: pr.head.sha,
                per_page: 100,
              });

              const statuses = requiredWorkflows.map(name => {
                const latestRun = workflowRuns.workflow_runs.find(candidate => candidate.name === name) || null;

                return {
                  name,
                  status: latestRun?.status || "missing",
                  conclusion: latestRun?.conclusion || null,
                };
              });

              const anyFailure = statuses.some(status =>
                ["failure", "timed_out", "cancelled", "action_required", "startup_failure"].includes(status.conclusion || "")
              );
              const allSuccess = statuses.every(status => status.conclusion === "success");
              const ciMarker = "<!-- codex:auto-ci-status -->";

              let commentBody = `${ciMarker}
              ## CI Status

              ${statuses.map(formatStatusLine).join("\n")}`.replace(/^ {14}/gm, "").trim();

              if (anyFailure) {
                commentBody = `${commentBody}

                Next step:
                - open the failed workflow in Checks or Actions
                - push a fix, and Codex will evaluate the PR again automatically`.replace(/^ {16}/gm, "").trim();

                await upsertComment(pr.number, ciMarker, commentBody);
                continue;
              }

              if (!allSuccess) {
                commentBody = `${commentBody}

                Next step:
                - waiting for the remaining required checks to finish`.replace(/^ {16}/gm, "").trim();

                await upsertComment(pr.number, ciMarker, commentBody);
                continue;
              }

              if (pr.base.ref !== context.payload.repository.default_branch) {
                commentBody = `${commentBody}

                Auto-merge skipped:
                - base branch is \`${pr.base.ref}\`, not the default branch \`${context.payload.repository.default_branch}\``.replace(/^ {16}/gm, "").trim();

                await upsertComment(pr.number, ciMarker, commentBody);
                continue;
              }

              if (pr.user.login !== context.repo.owner) {
                commentBody = `${commentBody}

                Auto-merge skipped:
                - this PR was not opened by the repository owner \`${context.repo.owner}\``.replace(/^ {16}/gm, "").trim();

                await upsertComment(pr.number, ciMarker, commentBody);
                continue;
              }

              if (pr.draft) {
                commentBody = `${commentBody}

                Auto-merge waiting:
                - move the PR out of draft to allow squash merge`.replace(/^ {16}/gm, "").trim();

                await upsertComment(pr.number, ciMarker, commentBody);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  sha: pr.head.sha,
                  merge_method: "squash",
                  commit_title: `${pr.title} (#${pr.number})`,
                });

                commentBody = `${commentBody}

                Auto-merge complete:
                - this PR was squash-merged automatically`.replace(/^ {16}/gm, "").trim();
              } catch (error) {
                const message = error?.response?.data?.message || error.message;

                commentBody = `${commentBody}

                Auto-merge blocked:
                - ${message}`.replace(/^ {16}/gm, "").trim();
              }

              await upsertComment(pr.number, ciMarker, commentBody);
            }
