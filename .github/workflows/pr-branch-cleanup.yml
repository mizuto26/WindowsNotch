name: PR Branch Cleanup

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  delete-merged-branch:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Delete merged head branch and update comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = "<!-- codex:auto-ci-status -->";

            async function upsertComment(issueNumber, body) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  per_page: 100,
                }
              );

              const existingComment = comments.find(comment =>
                typeof comment.body === "string" && comment.body.includes(marker)
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body,
                });
              }
            }

            if (pr.head.repo.fork) {
              core.info("Skipping branch cleanup for forked PR.");
              return;
            }

            if (pr.head.ref === context.payload.repository.default_branch) {
              core.info("Skipping branch cleanup for the default branch.");
              return;
            }

            let cleanupLine = `- branch cleanup skipped`;

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${pr.head.ref}`,
              });

              cleanupLine = `- deleted branch \`${pr.head.ref}\``;
            } catch (error) {
              const message = error?.response?.data?.message || error.message;
              cleanupLine = `- could not delete branch \`${pr.head.ref}\`: ${message}`;
            }

            const commentBody = `${marker}
            ## PR Status

            - merged into \`${pr.base.ref}\`
            ${cleanupLine}`.replace(/^ {12}/gm, "").trim();

            await upsertComment(pr.number, commentBody);
